<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leila Fuchter</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root{
    --azul-escuro:#081726;
    --dourado:#d4af37;
}

body{
    margin:0;
    font-family:'Poppins', sans-serif;
    background:var(--azul-escuro);
    color:white;
}

/* ===== HERO ===== */

.hero{
    position:relative;
    height:100vh;
    background:url('leilaa.jpg') center/cover no-repeat;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.hero::after{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:linear-gradient(to bottom, rgba(0,0,0,0.0), var(--azul-escuro));
}

.hero-content{
    position:relative;
    z-index:2;
    animation:fadeUp 1.5s ease;
}

.hero h1{
    font-family:'Playfair Display', serif;
    font-size:50px;
    color:var(--dourado);
    margin:0;
}

.hero p{
    font-size:18px;
    max-width:700px;
    margin:20px auto 0;
    opacity:0.8;
}

/* ===== HEADER ===== */

header{
    padding:60px 15%;
    text-align:center;
    background:#0d2233;
}

header h2{
    font-family:'Playfair Display', serif;
    color:var(--dourado);
    font-size:32px;
    margin:0;
}

/* ===== SECTION ===== */

.section{
    padding:60px 15%;
    line-height:1.7;
}

/* ===== IMAGENS ===== */

.team-image {
    width:100%;
    max-width:1100px; /* mantém perfeito no desktop */
    height:auto;
    display:block;
    margin:0 auto 30px auto;
    border-radius:8px;
}

/* ===== LINKS ===== */

a{
    color:var(--dourado);
    text-decoration:none;
}

/* ===== RESPONSIVO ===== */

@media (max-width: 768px){

    .hero{
        height:70vh;
        padding:20px;
    }

    .hero h1{
        font-size:32px;
    }

    .hero p{
        font-size:16px;
    }

    header{
        padding:40px 20px;
    }

    header h2{
        font-size:22px;
        line-height:1.4;
    }

    .section{
        padding:40px 20px;
    }

}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
    <div class="hero-content">
        <h1></h1>
        <p></p>
    </div>
</div>

<header>
