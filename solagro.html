<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nome da Página</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root{
    --azul-escuro:#081726;
    --dourado:#d4af37;
}

body{
    margin:0;
    font-family:'Poppins', sans-serif;
    background:#081726;
    color:white;
}

/* ===== HERO PREMIUM ===== */

.hero{
    position:relative;
    height:100vh;
    background:url('solagroo.jpg') center/cover no-repeat;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.hero::after{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:linear-gradient(to bottom, rgba(0,0,0,0.0), var(--azul-escuro));
}

.hero-content{
    position:relative;
    z-index:2;
    animation:fadeUp 1.5s ease;
}

.hero h1{
    font-family:'Playfair Display', serif;
    font-size:50px;
    color:var(--dourado);
}

.hero p{
    font-size:18px;
    max-width:700px;
    margin:auto;
    opacity:0.;
}

header{
    padding:40px;
    text-align:center;
    background:#0d2233;
}

h1{
    font-family:'Playfair Display', serif;
    color:#d4af37;
}

.section{
    padding:60px 15%;
    line-height:1.7;
}

a{
    color:#d4af37;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
    <div class="hero-content">
        <h1></h1>
        <p><p>
    </div>
</div>

<header>
    <h1>Título Aqui</h1>
</header>

<div class="section">
    <p>Conteúdo detalhado da palestra aqui...</p>
    <br>
    <a href="home.html">← Voltar</a>
</div>

</body>
</html>
