<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galeria Completa • Workshop Contabilizare</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root{
    --azul-escuro:#081726;
    --dourado:#d4af37;
}

body{
    margin:0;
    background:var(--azul-escuro);
    font-family:'Inter', sans-serif;
    color:white;
}

h1{
    text-align:center;
    padding:40px 20px 10px;
    font-family:'Montserrat', sans-serif;
    color:var(--dourado);
}

h2{
    text-align:center;
    margin:60px 0 30px;
    font-family:'Montserrat', sans-serif;
    color:var(--dourado);
}

.voltar{
    display:block;
    text-align:center;
    margin:20px 0 40px;
    color:var(--dourado);
    text-decoration:none;
    font-weight:500;
}

/* GRID PADRÃO */

.galeria{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    padding:0 10% 20px;
}

/* ITEM PADRÃO (foto ou vídeo) */

.item{
    position:relative;
    width:100%;
    aspect-ratio:4/3;
    border-radius:14px;
    overflow:hidden;
    cursor:pointer;
}

.item img,
.item iframe{
    width:100%;
    height:100%;
    object-fit:cover;
    border:none;
}

/* efeito hover */

.item img{
    transition:0.4s;
    filter:brightness(92%);
}

.item:hover img{
    transform:scale(1.05);
    filter:brightness(100%);
}

/* LIGHTBOX */

#lightbox{
    position:fixed;
    display:none;
    top:0;
    left:0;
    width:100%;
    height:100vh;
    background:rgba(0,0,0,0.95);
    justify-content:center;
    align-items:center;
    z-index:999;
}

#lightbox img{
    max-width:90%;
    max-height:85%;
    border-radius:14px;
}

/* MOBILE */

@media(max-width:768px){

    .galeria{
        grid-template-columns:repeat(2, 1fr); /* 2 colunas fixas */
        gap:12px;
        padding:0 16px 40px;
    }

    .item{
        aspect-ratio:4/3;
        border-radius:12px;
    }

    h1{
        font-size:24px;
        padding:30px 15px 5px;
    }

    h2{
        font-size:18px;
        margin:45px 0 20px;
        padding:0 10px;
    }

}
</style>
</head>

<body>

<h1>Galeria Completa</h1>
<a href="home.html" class="voltar">← Voltar para Home</a>

<!-- ABERTURA -->
<h2>📸 Abertura do Evento</h2>
<div class="galeria">

<div class="item">
    <img src="abertura1.jpg" onclick="abrir(this.src)">
</div>

<div class="item">
    <img src="abertura2.jpg" onclick="abrir(this.src)">
</div>

<div class="item">
    <iframe src="https://www.youtube.com/watch?v=qxzQR5uwWsk&list=TLGGx8QUoVLO3gMyMzAyMjAyNg&index=5"></iframe>
</div>

<div class="item">
    <img src="abertura3.jpg" onclick="abrir(this.src)">
</div>

</div>

<!-- PALESTRAS -->
<h2>📸 Palestras</h2>
<div class="galeria">

<div class="item">
    <img src="palestra1.jpg" onclick="abrir(this.src)">
</div>

<div class="item">
    <iframe src="https://www.youtube.com/watch?v=qxzQR5uwWsk&list=TLGGx8QUoVLO3gMyMzAyMjAyNg&index=5"></iframe>
</div>

<div class="item">
    <img src="palestra2.jpg" onclick="abrir(this.src)">
</div>

<div class="item">
    <img src="palestra3.jpg" onclick="abrir(this.src)">
</div>

</div>

<!-- NETWORKING -->
<h2>📸 Networking</h2>
<div class="galeria">

<div class="item">
    <img src="networking1.jpg" onclick="abrir(this.src)">
</div>

<div class="item">
    <img src="networking2.jpg" onclick="abrir(this.src)">
</div>

<div class="item">
    <iframe src="https://www.youtube.com/watch?v=qxzQR5uwWsk&list=TLGGx8QUoVLO3gMyMzAyMjAyNg&index=5"></iframe>
</div>

<div class="item">
    <img src="networking3.jpg" onclick="abrir(this.src)">
</div>

</div>

<a href="home.html" class="voltar">← Voltar para Home</a>

<!-- LIGHTBOX -->
<div id="lightbox" onclick="fechar()">
    <img id="imagemGrande">
</div>

<script>
function abrir(src){
    document.getElementById("lightbox").style.display="flex";
    document.getElementById("imagemGrande").src=src;
}

function fechar(){
    document.getElementById("lightbox").style.display="none";
}
</script>

</body>
</html>
