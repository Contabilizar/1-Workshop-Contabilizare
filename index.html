<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acesso - Workshop Contabilizare</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@400;500&display=swap" rel="stylesheet">

<style>
:root{
    --azul-escuro:#081726;
    --azul:#0f3c5f;
    --dourado:#d4af37;
}

body{
    margin:0;
    font-family:'Poppins', sans-serif;
    background:linear-gradient(135deg,var(--azul),var(--azul-escuro));
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:white;
}

.login-box{
    text-align:center;
    animation:fadeIn 1.2s ease;
}

.login-box h2{
    font-family:'Playfair Display', serif;
    color:var(--dourado);
    font-size:32px;
}

input{
    padding:14px;
    width:260px;
    margin-top:15px;
    border:none;
    border-radius:8px;
    outline:none;
}

button{
    margin-top:15px;
    padding:12px 30px;
    background:var(--dourado);
    border:none;
    border-radius:8px;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="login-box">
    <h2>Acesso Exclusivo</h2>
    <p>Workshop Contabilizare 2026</p>
    <input type="password" id="senha" placeholder="Digite sua senha">
    <br>
    <button onclick="verificarSenha()">Entrar</button>
</div>

<script>
function verificarSenha(){
    var senha = document.getElementById("senha").value;
    if(senha === "contabilizare2026"){
        window.location.href = "home.html";
    }else{
        alert("Senha incorreta!");
    }
}
</script>

</body>
</html>
